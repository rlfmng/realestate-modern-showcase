<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect all 404s to index.html for SPA
      var path = window.location.pathname;
      var repo = "/realestate-modern-showcase";
      var redirect = repo + "/index.html";
      window.location.replace(redirect + "#" + path);
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected automatically, <a id="redirect-link">click here</a>.</p>
    <script>
      document.getElementById("redirect-link").href = redirect + "#" + path;
    </script>
  </body>
</html>
